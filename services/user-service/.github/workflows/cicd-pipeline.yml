# ─────────────────────────────────────────
# .github/workflows/cicd-pipeline.yml
# CI/CD Pipeline — Smart Campus Platform
# ICT University Cameroun — Dr Fosso
# ─────────────────────────────────────────

name: 🚀 Smart Campus CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ict-university/smart-campus

jobs:

  # ══════════════════════════════
  # JOB 1 — TESTS UNITAIRES
  # ══════════════════════════════
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, course-service, payment-service, notification-service]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: 📦 Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: 🧪 Run unit tests
        working-directory: services/${{ matrix.service }}
        run: npm run test:unit
        env:
          NODE_ENV: test

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  # ══════════════════════════════
  # JOB 2 — TESTS INTEGRATION API
  # ══════════════════════════════
  integration-tests:
    name: 🔗 Integration & API Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: campus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      rabbitmq:
        image: rabbitmq:3.12-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔗 Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: test_password
          DB_NAME: campus_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RABBITMQ_URL: amqp://localhost:5672
          JWT_SECRET: test_jwt_secret_key

      - name: 🌐 Run API tests (Newman/Postman)
        run: npm run test:api

  # ══════════════════════════════
  # JOB 3 — SECURITE & QUALITE
  # ══════════════════════════════
  security-scan:
    name: 🔒 Security & Quality Scan
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Scan dependencies (npm audit)
        run: npm audit --audit-level=high

      - name: 🔒 SAST Security scan (CodeQL)
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: 🔒 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: 📏 Code quality (ESLint)
        run: npm run lint

  # ══════════════════════════════
  # JOB 4 — BUILD DOCKER IMAGES
  # ══════════════════════════════
  build-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    strategy:
      matrix:
        service: [user-service, course-service, payment-service, notification-service]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: 🔨 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          dockerfile: ./dockerfiles/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════
  # JOB 5 — DEPLOY STAGING
  # ══════════════════════════════
  deploy-staging:
    name: 🟡 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: 🚀 Deploy to staging namespace
        run: |
          kubectl apply -f kubernetes/ -n campus-staging
          kubectl rollout status deployment/user-service -n campus-staging
          kubectl rollout status deployment/course-service -n campus-staging
          kubectl rollout status deployment/payment-service -n campus-staging
          kubectl rollout status deployment/notification-service -n campus-staging

      - name: ✅ Smoke tests on staging
        run: |
          STAGING_URL="https://staging.smartcampus.cm/v1"
          curl -f "$STAGING_URL/health" || exit 1
          echo "✅ Staging smoke test passed"

  # ══════════════════════════════
  # JOB 6 — DEPLOY PRODUCTION
  # ══════════════════════════════
  deploy-production:
    name: 🟢 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Configure kubectl (Production)
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: 🚀 Rolling deploy to production
        run: |
          kubectl apply -f kubernetes/ -n campus-production
          kubectl rollout status deployment/user-service -n campus-production --timeout=300s
          kubectl rollout status deployment/course-service -n campus-production --timeout=300s
          kubectl rollout status deployment/payment-service -n campus-production --timeout=300s
          kubectl rollout status deployment/notification-service -n campus-production --timeout=300s

      - name: ✅ Production health check
        run: |
          PROD_URL="https://api.smartcampus.cm/v1"
          curl -f "$PROD_URL/health" || exit 1
          echo "✅ Production deployment successful"

      - name: 📢 Notify team on Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 Production deploy: $STATUS — Smart Campus v${{ github.sha }}\"}"
