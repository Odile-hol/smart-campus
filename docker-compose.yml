version: '3.9'

services:

  user-service:
    build: ./services/user-service
    container_name: campus-user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    restart: unless-stopped

  course-service:
    build: ./services/course-service
    container_name: campus-course-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    container_name: campus-payment-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: campus-notification-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: campus-rabbitmq
    ports:
      - "15672:15672"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: campus-redis
    ports:
      - "6379:6379"
    restart: unless-stopped